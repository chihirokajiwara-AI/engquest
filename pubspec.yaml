name: engquest
description: ENG Quest — L1-L2 boundary elimination platform for Japanese children
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase (web + iOS + Android)
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_analytics: ^12.4.1
  firebase_messaging: ^16.2.2
  # Notifications — flutter_local_notifications removed (web no-op stub,
  # mobile notifications handled via firebase_messaging for now).
  # Re-add when implementing local scheduled reminders on mobile.
  timezone: ^0.11.0
  # SRS / Data — sqflite removed (using InMemoryFsrsCardRepository +
  # Firestore; sqflite will be re-added when offline-first mobile sync
  # is implemented)
  path: ^1.9.0
  # Persistence / Prefs
  shared_preferences: ^2.2.0
  path_provider: ^2.1.2
  equatable: ^2.0.5
  # Networking (Claude API)
  http: ^1.1.0
  # Crypto (analytics hashing)
  crypto: ^3.0.3
  # Audio playback
  audioplayers: ^5.2.1
  # Speech recognition (Web Speech API / Apple Speech / Google Speech)
  speech_to_text: ^7.0.0
  # In-app purchases (RevenueCat — unified iOS StoreKit 2 / Android GPBL / Web)
  purchases_flutter: ^8.11.0
  # URL launching (mailto + subscription-management URLs)
  url_launcher: ^6.3.2
  # UI
  cupertino_icons: ^1.0.6
  # Fonts
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.0
  fake_cloud_firestore: ^4.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/audio/a1/
    - assets/audio/phonics/
    - assets/audio/quiz/
    - assets/audio/listening/
    # #133 pre-literacy tap-to-speak JP nav-label clips (~84KB total, macOS say -v
    # Kyoko; assets/audio/ui_ja/). Bundled (negligible vs the #48 925MB word-audio
    # problem) so AudioCueService.play(AssetSource) serves them offline.
    - assets/audio/ui_ja/
    # NOTE: per-word 英検 vocab MP3s (eiken5..eiken_pre1, ~21k files) are
    # deliberately NOT bundled. They added ~21,184 of the AssetManifest's 23,266
    # entries (a 1.3MB manifest fetched+parsed on EVERY cold start) and ~925MB to
    # the web build — yet are never served live: the deploy excludes audio and the
    # Google-TTS key is unconfigured, so TtsService already falls through to
    # "unavailable". Bundling them was pure cold-start tax for zero live audio.
    # When per-word pronunciation ships, serve it on demand (network/CDN), not as
    # a bundled asset. Keeps quiz/phonics/listening/a1 (quest + exam + legacy).
    - assets/images/
    - assets/images/categories/
    - assets/content/
    - assets/data/
    - assets/art/
    - assets/art/masters/
    - assets/art/scenes/
    - assets/art/npc/
    - assets/art/characters/
    - assets/art/scenes_layton/

  # Bundled Japanese serif — replaces google_fonts' RUNTIME CDN fetch, which did
  # not reliably land on the demo and left every Japanese glyph as tofu (□). One
  # variable TTF carries all weights (w100–w900 via the `wght` axis), so
  # TextStyle.fontWeight is honored from the single file. See lib/core/ui/app_fonts.dart.
  fonts:
    - family: Noto Serif JP
      fonts:
        - asset: assets/fonts/NotoSerifJP.ttf
