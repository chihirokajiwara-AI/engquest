name: engquest
description: ENG Quest — L1-L2 boundary elimination platform for Japanese children
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.15.4
  firebase_analytics: ^10.8.4
  # SRS / Data
  sqflite: ^2.3.2
  path: ^1.9.0
  # Persistence / Prefs
  shared_preferences: ^2.2.0
  # Networking (Claude API)
  http: ^1.1.0
  # Crypto (analytics hashing)
  crypto: ^3.0.3
  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/content/
