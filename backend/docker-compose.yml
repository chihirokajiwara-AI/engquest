version: '3.8'

services:
  aken-backend:
    build: .
    container_name: aken-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID:-price_aken_monthly_999}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
