# ─────────────────────────────────────────────────────────────────────────────
# ENG Quest — nginx site config (Flutter Web)
# Serves the production build from /var/www/engquest on BOTH port 80 and 8080.
#
# URL CONTRACT (P0.3 fix): the documented live demo URL is
#   http://178.105.113.79:8080/   (shared in decks, links, QA runbooks)
# but operators have also configured plain :80 on the box. To honor BOTH the
# documented :8080 contract AND the clean no-port :80 URL — and to be resilient
# to whichever port a future deploy expects — this server listens on both.
# Killing one port silently broke the documented URL before; listening on both
# eliminates that drift permanently.
#
# NOTE (P0.3 hardening): the web root is /var/www/engquest — a PERSISTENT
# location. The previous root (/tmp/engquest/build/web) lived under /tmp, which
# many distros wipe on reboot (systemd-tmpfiles), causing the live demo to 404
# or nginx to fail after a reboot. install_nginx.sh now syncs the build into
# /var/www/engquest so the site survives reboots regardless of /tmp policy.
# Replaces the throwaway `python -m http.server` with a real web server:
#   - gzip (and pre-compressed .gz) for fast first paint on Japanese mobile networks
#   - aggressive immutable caching for hashed Flutter assets
#   - NO caching for index.html / service worker so deploys take effect instantly
#   - SPA fallback so deep links resolve to index.html
#   - correct MIME + CORS for audio (.mp3) and SVG assets
#
# Deployed to: /etc/nginx/sites-available/engquest.conf
# Symlinked at: /etc/nginx/sites-enabled/engquest.conf
# Managed by:   systemd (nginx.service) → auto-restarts on reboot & crash.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 8080;
    listen [::]:8080;
    server_name 178.105.113.79 _;

    root /var/www/engquest;
    index index.html;

    # ── gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # Serve pre-compressed *.gz built at deploy time when the client supports it.
    gzip_static on;

    # ── index.html — never cache (so new builds appear immediately) ───────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ── service worker — never cache (PWA update correctness) ──────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ── hashed Flutter build artifacts — cache forever (content-addressed) ─────
    location ~* \.(?:js|css|wasm)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ── static assets (audio / images / fonts) — long cache ───────────────────
    location ~* \.(?:mp3|svg|png|jpg|jpeg|gif|ico|json|ttf|otf|woff|woff2)$ {
        add_header Cache-Control "public, max-age=2592000" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # ── SPA fallback — all other routes resolve to index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # security: hide nginx version banner
    server_tokens off;

    # explicit MIME for wasm (older nginx mime.types may miss it)
    types {
        application/wasm wasm;
    }

    access_log /var/log/nginx/engquest.access.log;
    error_log  /var/log/nginx/engquest.error.log warn;
}
