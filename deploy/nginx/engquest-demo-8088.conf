# Live demo (:8088) nginx server block — CONFIG-AS-CODE source of truth (#51).
#
# Reconciled 2026-06-09 to match what is actually serving on the VPS (the live
# block currently lives inline in /etc/nginx/sites-available/engquest, manually
# added — untracked drift). This file is now the canonical version; on the next
# reprovision (recover_live_demo.sh / install_nginx.sh) the live block should be
# sourced FROM here so it can never drift untracked again. Best-of-both of the
# prior drift: the live block's HARD no-store on the app shell (so a reload
# always shows the latest deploy) + this file's broader gzip (gzip_vary + svg).
server {
    listen 8088;
    root /srv/engquest-web;
    index index.html;

    # Demo under active iteration: never cache the app shell so a plain reload
    # always shows the latest deploy (no stale-asset false alarms).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain application/javascript application/wasm text/css application/json application/octet-stream image/svg+xml;
}
