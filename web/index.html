<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ENG Quest - L1-L2 boundary elimination platform">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ENG Quest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ENG Quest</title>
  <link rel="manifest" href="manifest.json">
  <!-- Preload the bundled JP serif (2.2 MB) so the browser fetches it IN PARALLEL
       with the engine download instead of serially after FontManifest.json parses
       (~4 s in). The CSS boot-splash below keeps first-paint instant either way, so
       this just removes the post-engine tofu flash — child-facing 日本語 renders
       with glyphs the moment Flutter paints, not 2 s later. URL is the real
       Flutter-web asset path (double-assets/ quirk; verified 200 + 2.2 MB on the
       live build). crossorigin is mandatory for font preloads (fonts fetch in CORS
       mode even same-origin) or the browser double-fetches. (perf, CEO 1355) -->
  <link rel="preload" href="assets/assets/fonts/NotoSerifJP.ttf" as="font" type="font/ttf" crossorigin>
  <style>
    body {
      background: #0F0E17;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    /* Boot splash — shows INSTANTLY (pure CSS, no assets) so the cold-start
       download doesn't look like a frozen blank screen. Removed on Flutter's
       first frame, with a hard fallback so it can never permanently hide the app. */
    #boot-splash {
      position: fixed;
      inset: 0;
      background: #0F0E17;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 9999;
      transition: opacity 0.4s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
        "Yu Gothic", sans-serif;
    }
    #boot-splash .boot-logo {
      color: #4FC3F7;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    #boot-splash .boot-spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(79, 195, 247, 0.25);
      border-top-color: #4FC3F7;
      border-radius: 50%;
      animation: boot-spin 1s linear infinite;
    }
    #boot-splash .boot-msg {
      color: #8A93B5;
      font-size: 13px;
    }
    @keyframes boot-spin {
      to {
        transform: rotate(360deg);
      }
    }
    #boot-splash.boot-hide {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="boot-splash" role="status" aria-live="polite">
    <div class="boot-logo">A-KEN Quest</div>
    <div class="boot-spinner" aria-hidden="true"></div>
    <div class="boot-msg">よみこみ中… / Loading…</div>
  </div>
  <script>
    (function () {
      var splash = document.getElementById('boot-splash');
      if (!splash) return;
      function hide() {
        if (!splash) return;
        splash.classList.add('boot-hide');
        var node = splash;
        setTimeout(function () {
          if (node && node.parentNode) node.parentNode.removeChild(node);
        }, 500);
        splash = null;
      }
      // Primary: remove the splash the moment Flutter paints its first frame.
      window.addEventListener('flutter-first-frame', hide);
      // Fallback: never let the splash hide the app permanently if the event
      // is missed for any reason.
      setTimeout(hide, 25000);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
