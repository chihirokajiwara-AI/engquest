name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs for same branch (saves free-tier minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Flutter setup ─────────────────────────────────────────────────────
      - name: Set up Flutter 3.44.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true
          cache-key: 'flutter-${{ runner.os }}-3.44.x'

      # ── Pub cache ─────────────────────────────────────────────────────────
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.PUB_CACHE }}
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml', 'pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── Audio asset integrity ──────────────────────────────────────────────
      # Ensures every status="ready" word in audio_manifest.json has its MP3
      # bundled (assets/audio/a1) AND web-served (web/audio/a1) byte-identically,
      # and that manifest webPath/localCachePath match real filenames.
      - name: Verify audio assets
        run: python3 scripts/verify_audio_assets.py

      # ── 英検 listening audio coverage ───────────────────────────────────────
      # Asserts every audioKey in listening_data.dart has a non-empty bundled
      # clip (and no stale ALLOWED_MISSING waiver). AudioCueService swallows a
      # missing clip silently, so without this a listening item ships a dead 🔊
      # button and is dropped from the by-ear 合格率 with no error.
      - name: Verify listening audio coverage
        run: python3 scripts/verify_listening_audio.py

      # ── Native audio manifest contract ─────────────────────────────────────
      # Asserts assets/content/audio_manifest.json covers all 300 words with a
      # schema that AudioManifestEntry.fromJson (tts_service.dart) can parse
      # (required non-null storagePath etc.), and that web/public/ is gone.
      - name: Verify native audio manifest
        run: python3 scripts/test_audio_manifest.py

      # ── Audio-bundle budget (#48) ──────────────────────────────────────────
      # Locks the cold-start fix: the ~925MB of per-word 英検 MP3s (eiken5…pre1,
      # ~21k files) must NOT be bundled — a one-line pubspec re-add would re-bloat
      # the build by hundreds of MB + thousands of AssetManifest entries, and only
      # a real-browser/deploy audit would otherwise catch it.
      - name: Verify pubspec audio budget
        run: python3 scripts/verify_pubspec_audio_budget.py

      # ── Bundled JP font coverage ───────────────────────────────────────────
      # Asserts the committed assets/fonts/NotoSerifJP.ttf subset covers every
      # Japanese source character, so new JP text added without re-running
      # subset_jp_font.py is caught here instead of shipping silent tofu (□).
      - name: Verify JP font coverage
        run: |
          pip install --quiet fonttools
          python3 scripts/verify_font_coverage.py

      # ── Analyze ───────────────────────────────────────────────────────────
      - name: Flutter analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      # ── Format check ──────────────────────────────────────────────────────
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      # ── Unit + Widget tests ────────────────────────────────────────────────
      - name: Run tests
        run: flutter test --coverage --reporter=github

      # ── Coverage report (optional, no external service needed) ────────────
      - name: Upload coverage artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 30

  # ── Android build check ─────────────────────────────────────────────────────
  build-android:
    name: Android Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter 3.44.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true
          cache-key: 'flutter-${{ runner.os }}-3.44.x'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: flutter pub get

      # google-services.json is gitignored (per-developer Firebase config). For a
      # COMPILE-only build check we generate a syntactically-valid placeholder
      # with both flavor package names — it lets the google-services Gradle plugin
      # run; it carries no real credentials. Real release builds inject the true
      # file from a secret. (#143)
      - name: Generate placeholder google-services.json (build-check only)
        run: |
          python3 - <<'PY'
          import json
          def client(pkg, suffix):
              return {
                  "client_info": {
                      "mobilesdk_app_id": f"1:000000000000:android:{suffix}",
                      "android_client_info": {"package_name": pkg},
                  },
                  "oauth_client": [],
                  "api_key": [{"current_key": "AIzaSyCI00000000000000000000000000000000"}],
                  "services": {"appinvite_service": {"other_platform_oauth_client": []}},
              }
          cfg = {
              "project_info": {
                  "project_number": "000000000000",
                  "project_id": "engquest-ci-placeholder",
                  "storage_bucket": "engquest-ci-placeholder.appspot.com",
              },
              "client": [
                  client("jp.co.aesthetic.engquest.edilab", "0000000000000000000000"),
                  client("jp.co.aesthetic.akenquest", "1111111111111111111111"),
              ],
              "configuration_version": "1",
          }
          open("android/app/google-services.json", "w").write(json.dumps(cfg, indent=2))
          print("wrote placeholder android/app/google-services.json")
          PY

      - name: Build Android appbundle (edilab, debug)
        run: flutter build appbundle --flavor edilab -t lib/main_edilab.dart --debug

  # ── iOS build check ──────────────────────────────────────────────────────────
  build-ios:
    name: iOS Build Check
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter 3.44.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true
          cache-key: 'flutter-${{ runner.os }}-3.44.x'

      # Flutter now enables Swift Package Manager by default, but key plugins
      # (purchases_flutter, audioplayers_darwin) don't support SPM, and SPM
      # resolution fails fetching a transitive test dep (CwlCatchException). The
      # project ships a Podfile, so force the stable CocoaPods path. (#143)
      - name: Use CocoaPods (disable Swift Package Manager)
        run: flutter config --no-enable-swift-package-manager

      - name: Install dependencies
        run: flutter pub get

      # NOTE: no --flavor. iOS flavor schemes (edilab/aken) don't exist in the
      # Xcode project yet (Android uses Gradle productFlavors; iOS needs Xcode
      # schemes + build configs — tracked separately for release). This build
      # CHECK verifies the iOS app COMPILES via the edilab entrypoint on the
      # default Runner scheme; flavor bundle-id/app-name config is a release
      # concern, not a compilation one. (#143 → iOS-flavor-schemes follow-up)
      # The CocoaPods CDN (cdn.cocoapods.org) intermittently 404s during the
      # pod install that the iOS build runs ("fatal: repository
      # 'https://cdn.cocoapods.org/' not found"), turning main red on pure infra
      # noise while analyze/test/android stay green. Retry up to 3× so a transient
      # CDN blip self-heals; a real compile error still fails all 3 → red.
      - name: Build iOS (edilab entrypoint, no-codesign)
        run: |
          for attempt in 1 2 3; do
            echo "::group::iOS build attempt $attempt/3"
            if flutter build ios -t lib/main_edilab.dart --no-codesign; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "attempt $attempt failed (often a transient CocoaPods CDN 404); retrying in 20s…"
            sleep 20
          done
          echo "iOS build failed after 3 attempts"
          exit 1

  # ── Web build check ──────────────────────────────────────────────────────────
  # Web is the PRIMARY platform (the live site at 178.105.113.79 is Flutter web),
  # yet CI only built Android + iOS — a web-only compile break (e.g. an accidental
  # dart:io import, forbidden for web but not otherwise gated) could ship to the
  # primary target unnoticed. This deterministic release build closes that gap.
  # The interactive real-browser smoke (Playwright/CanvasKit semantics) runs
  # locally via scripts/audit_realbrowser.sh; wiring that flaky browser layer into
  # CI reliably is a separate follow-up so it never reds the build on infra noise.
  build-web:
    name: Web Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter 3.44.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true
          cache-key: 'flutter-${{ runner.os }}-3.44.x'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (edilab entrypoint, release)
        run: flutter build web --release -t lib/main_edilab.dart

      - name: Upload web build for the smoke job
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: build/web
          retention-days: 1

  # ── Real-browser smoke (NON-GATING canary) ─────────────────────────────────
  # Serves the built web app and runs scripts/smoke_flow.mjs (de-flaked 21cd401):
  # boots the app, walks the core 英検 flow via the CanvasKit semantics tree, and
  # fails on JS errors / dropped taps. Deliberately NOT in ci-pass `needs`: a
  # headless-CanvasKit smoke can flake on infra and this job has never run in CI
  # yet, so gating on it could red main on noise. It runs on every push for
  # visibility; promote it into ci-pass `needs` ONLY after it proves stable over
  # real runs. (smoke_flow.mjs SKIPs with exit 0 if playwright is absent.)
  smoke-web:
    name: Real-browser Smoke (canary, non-gating)
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download the web build
        uses: actions/download-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: build/web

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: npm install --no-save playwright@1.44.0 && npx playwright install --with-deps chromium

      # serve + smoke MUST share one step: a backgrounded process is killed when
      # its `run` step ends, so serving in a prior step would leave nothing up.
      - name: Serve build + real-browser core-flow smoke
        env:
          PLAYWRIGHT_PATH: ${{ github.workspace }}/node_modules/playwright/index.js
        run: |
          npm install --no-save serve@14
          npx serve build/web -p 8099 -s &
          SERVE_PID=$!
          for i in $(seq 1 30); do curl -sf http://localhost:8099/ >/dev/null && break; sleep 1; done
          node scripts/smoke_flow.mjs http://localhost:8099
          STATUS=$?
          kill $SERVE_PID 2>/dev/null || true
          exit $STATUS

      - name: Upload smoke screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-end-screenshot
          path: /tmp/eq_smoke_end.png
          retention-days: 3

  # ── Summary job (required status check) ────────────────────────────────────
  ci-pass:
    name: CI Pass
    needs: [analyze-and-test, build-android, build-ios, build-web]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.analyze-and-test.result }}" != "success" ]; then
            echo "❌ analyze-and-test failed"
            exit 1
          fi
          if [ "${{ needs.build-android.result }}" != "success" ]; then
            echo "❌ build-android failed"
            exit 1
          fi
          if [ "${{ needs.build-ios.result }}" != "success" ]; then
            echo "❌ build-ios failed"
            exit 1
          fi
          if [ "${{ needs.build-web.result }}" != "success" ]; then
            echo "❌ build-web failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
